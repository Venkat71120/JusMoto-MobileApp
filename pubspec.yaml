name: car_service
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+3

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  badges: ^3.1.2
  card_swiper: ^3.0.1
  connectivity_plus: ^6.0.3
  figma_squircle_updated: ^1.0.1
  file_picker: ^8.0.3
  firebase_messaging: ^15.1.5
  flutter_animate: ^4.5.0
  flutter_facebook_auth: ^7.0.1
  flutter_local_notifications: ^18.0.1
  flutter_localizations:
    sdk: flutter
  flutter_rating_bar: ^4.0.1
  flutter_stripe: ^11.4.0
  flutter_svg: ^2.0.10+1
  flutter_widget_from_html: ^0.15.1
  fluttertoast: ^8.2.5
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.1
  http: ^1.2.1
  http_auth: ^1.0.4
  intl: 0.20.2
  lottie: ^3.1.2
  photo_view: ^0.15.0
  pinput: ^5.0.0
  provider: ^6.1.2
  pusher_channels_flutter:
    git:
      url: https://github.com/KamrulIbnZaman/pusher-channels-flutter
      ref: master
  readmore: ^3.0.0
  shared_preferences: ^2.2.3
  sign_in_with_apple: ^6.1.1
  slide_countdown: ^2.0.1
  sqflite: ^2.3.3+1
  timeago: ^3.6.1
  flutter_inappwebview: ^6.1.5
  url_launcher: ^6.2.6
  google_maps_flutter: ^2.3.1
  geolocator: ^13.0.2

  path: any
  crypto: any
  webview_flutter: any
  uuid: any
  cached_network_image: any
  google_maps_flutter_android: any
  google_maps_flutter_platform_interface: any
  flutter_launcher_icons: ^0.13.1
  flutter_cache_manager: ^3.3.1
  just_audio: ^0.9.42
  youtube_player_iframe: ^5.2.1
  iyzi_dart: ^0.4.1
  firebase_auth: ^5.7.0
  socket_io_client: ^2.0.3
  font_awesome_flutter: ^10.9.1
  pdf: ^3.11.1
  printing: ^5.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  image_path: "assets/images/jusmoto.png"
  android: true
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#ffffff"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/jusmoto.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/files/
    - assets/audios/

  fonts:
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-Light.ttf
          weight: 300
        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-ExtraBold.ttf
          weight: 800
    - family: Poppins
      fonts:
        - asset: assets/fonts/poppins/Poppins-Regular.ttf
        - asset: assets/fonts/poppins/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/poppins/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/poppins/Poppins-ExtraBold.ttf
          weight: 800
    - family: Bebas Neue
      fonts:
        - asset: assets/fonts/bebas_neue/BebasNeue-Regular.ttf
